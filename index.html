<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="lock_and_key.png">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>St. Edward's Course Prerequisite Explorer</title>
<style>
:root { --bg:#f7f6f2; --panel:#fff; --ink:#1f2937; --muted:#6b7280; --line:#d7d2c8; --accent:#2b6cb0; --warn:#a16207; --bad:#991b1b; }
* { box-sizing:border-box; }
body { margin:0; font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background:var(--bg); color:var(--ink); }
header { padding:28px 32px 18px; background:linear-gradient(135deg,#fff,#eee8dc); border-bottom:1px solid var(--line); }
h1 { margin:0 0 8px; font-size:clamp(1.6rem,3vw,2.4rem); }
.sub { color:var(--muted); max-width:980px; line-height:1.45; }
.status { margin-top:10px; font-size:.9rem; color:var(--muted); }
.status.error { color:var(--bad); font-weight:700; }
main { display:grid; grid-template-columns:380px 1fr; gap:18px; padding:18px; min-height:calc(100vh - 145px); }
.panel { background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:0 8px 22px rgba(0,0,0,.06); overflow:hidden; }
.left { display:flex; flex-direction:column; min-height:620px; }
.searchbox { padding:16px; border-bottom:1px solid var(--line); }
input[type="search"] { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:12px; font-size:1rem; outline:none; }
input[type="search"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(43,108,176,.15); }
.hint { font-size:.85rem; color:var(--muted); margin-top:8px; }
.results { overflow:auto; padding:10px; }
.result { padding:12px; border-radius:12px; cursor:pointer; border:1px solid transparent; }
.result:hover { background:#f2f7fb; border-color:#c9dbea; }
.result.active { background:#e7f0fa; border-color:#9ec1df; }
.code { font-weight:800; letter-spacing:.02em; color:#111827; }
.title { color:#374151; margin-top:2px; }
.meta { color:var(--muted); font-size:.82rem; margin-top:3px; }
.right { padding:18px; overflow:auto; }
.course-head { display:flex; flex-wrap:wrap; align-items:baseline; gap:10px; padding-bottom:14px; border-bottom:1px solid var(--line); }
.course-head h2 { margin:0; font-size:1.7rem; }
.chip { display:inline-flex; align-items:center; padding:4px 9px; border-radius:999px; background:#eef2f7; color:#374151; font-size:.82rem; margin:3px 4px 0 0; }
.tree-wrap { margin-top:18px; }
.tree-title { font-weight:800; margin-bottom:10px; }
.tree-toolbar { display:flex; gap:8px; align-items:center; margin:0 0 10px; }
.tree-toolbar button { appearance:none; border:1px solid var(--line); background:#fff; color:var(--ink); padding:7px 11px; border-radius:10px; font-size:.9rem; font-weight:700; cursor:pointer; }
.tree-toolbar button:hover { border-color:var(--accent); background:#f8fbff; }

.req-graph { position:relative; overflow:hidden; padding:18px; border:1px solid var(--line); border-radius:16px; background:#fbfaf7; min-height:320px; width:100%; }
.req-graph-content { position:relative; transform-origin:top left; transition:transform .15s ease; width:100%; }
.req-graph-svg { position:absolute; inset:0; pointer-events:none; overflow:visible; }
.graph-levels { position:relative; z-index:2; display:flex; flex-direction:column; gap:64px; min-width:0; width:100%; }
.graph-level { position:relative; }
.graph-level { display:flex; justify-content:center; align-items:center; gap:28px 34px; min-height:58px; padding:4px 8px; flex-wrap:wrap; max-width:100%; }
.graph-node { display:inline-flex; align-items:flex-start; gap:8px; flex:0 1 250px; max-width:min(250px, 100%); min-width:170px; padding:9px 12px; border:1px solid var(--line); border-radius:14px; background:#fff; box-shadow:0 4px 12px rgba(0,0,0,.045); cursor:default; position:relative; text-align:left; }
.graph-node:hover { border-color:var(--accent); background:#f8fbff; }
.graph-node.missing { border-style:dashed; color:var(--warn); background:#fffaf0; }
.graph-node.selected { border-color:#c4b5fd; background:#f5f3ff; }
.graph-node.leaf { background:#f8fafc; }
.graph-node-content { display:flex; flex-direction:column; gap:5px; min-width:0; flex:1; }
.graph-node-top { display:flex; flex-wrap:wrap; align-items:center; gap:5px 6px; line-height:1.18; }
.graph-node-code { font-weight:900; letter-spacing:.02em; color:#111827; }
.graph-node-title { font-size:.86rem; color:#374151; line-height:1.25; overflow-wrap:anywhere; word-break:normal; }
.graph-levels.crowded .graph-level { gap:22px 24px; }
.graph-levels.crowded .graph-node { flex-basis:225px; max-width:min(225px, 100%); }
.graph-levels.very-crowded .graph-level { gap:18px 18px; }
.graph-levels.very-crowded .graph-node { flex-basis:200px; max-width:min(200px, 100%); font-size:.92rem; }
.graph-levels.very-crowded .graph-node-title { font-size:.82rem; }
.leaf-dot { font-size:1.35rem; line-height:1; color:#9ca3af; font-weight:900; flex:0 0 auto; margin-top:1px; }
.edge-label { font-size:.65rem; font-weight:800; text-transform:uppercase; letter-spacing:.03em; padding:2px 5px; border-radius:999px; background:#eef2f7; color:#374151; }
.edge-label.prereq { background:#e7f0fa; color:#1e3a8a; }
.edge-label.coreq { background:#ecfdf5; color:#065f46; }
.edge-label.precoreq { background:#fff7ed; color:#9a3412; }
.edge-label.selected { background:#ede9fe; color:#5b21b6; }
.edge-path { fill:none; stroke:var(--line); stroke-width:2; marker-end:url(#arrowHead); }
.edge-path.prereq { stroke:#9ec1df; }
.edge-path.coreq { stroke:#86efac; stroke-dasharray:7 5; }
.edge-path.precoreq { stroke:#fdba74; stroke-dasharray:4 4; }
.empty { color:var(--muted); padding:16px 0; }
.tooltip { position:fixed; display:none; max-width:430px; z-index:100; background:#111827; color:#fff; border-radius:14px; box-shadow:0 12px 32px rgba(0,0,0,.25); padding:12px 14px; font-size:.88rem; line-height:1.35; pointer-events:none; }
.tooltip .tt-title { font-weight:800; font-size:.95rem; margin-bottom:6px; }
.tooltip .tt-line { margin-top:5px; color:#e5e7eb; }
.tooltip .tt-label { color:#bfdbfe; font-weight:700; }
.desc { margin-top:14px; color:#374151; line-height:1.55; max-width:1000px; }
.reverse-wrap { margin-top:20px; padding-top:16px; border-top:1px solid var(--line); }
.reverse-title { font-weight:800; margin-bottom:8px; }
.reverse-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.reverse-link { appearance:none; border:1px solid var(--line); background:#fff; color:var(--accent); padding:7px 10px; border-radius:999px; font-weight:700; cursor:pointer; }
.reverse-link:hover { border-color:var(--accent); background:#f8fbff; }

.export-status { font-size:.85rem; color:var(--muted); margin-left:6px; }
.export-status.error { color:var(--bad); font-weight:700; }
.export-clone-wrap { position:fixed; left:-100000px; top:0; background:#fff; z-index:-1; }
.export-clone-wrap .right { overflow:visible; box-shadow:none; }
@media (max-width: 900px) { main { grid-template-columns:1fr; } .left { min-height:auto; } }
</style>
</head>
<body>
<header>
  <h1>
    <span style="font-weight:500; color:#666;">Course Prerequisite Explorer</span>
    25' - 26' Bulletin
  </h1>
  <div id="status" class="status">Loading CSV…</div>
</header>
<main>
  <section class="panel left">
    <div class="searchbox">
      <input id="search" type="search" placeholder="Search: COSC 2325, biology, accounting…" disabled />
      <div class="hint">Searches class number, course prefix + number, and course title.</div>
    </div>
    <div id="results" class="results"><div class="empty">No courses loaded yet.</div></div>
  </section>
  <section class="panel right">
    <div id="detail" class="empty">Load the CSV, then select a course to see its prerequisite tree.</div>
  </section>
</main>
<div id="tooltip" class="tooltip"></div>
<script>
(function () {
  'use strict';

  const CSV_URL = 'st_edwards_2025_2026_all_courses.csv';
  const CODE_RE = /\b([A-Z]{2,5})\s*-?\s*(\d{4})\b/g;

  let courses = [];
  let courseByCode = new Map();
  let activeCode = null;
  let currentGraph = null;

  const els = {
    status: document.getElementById('status'),
    search: document.getElementById('search'),
    results: document.getElementById('results'),
    detail: document.getElementById('detail'),
    tooltip: document.getElementById('tooltip')
  };

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function parseCsv(text) {
    text = text.replace(/^\uFEFF/, '');
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i += 1) {
      const ch = text[i];
      const next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') {
          field += '"';
          i += 1;
        } else if (ch === '"') {
          inQuotes = false;
        } else {
          field += ch;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          row.push(field);
          field = '';
        } else if (ch === '\n') {
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else if (ch !== '\r') {
          field += ch;
        }
      }
    }
    if (field.length > 0 || row.length > 0) {
      row.push(field);
      rows.push(row);
    }
    if (rows.length === 0) return [];

    const headers = rows[0].map(h => h.trim());
    return rows.slice(1)
      .filter(r => r.some(v => String(v || '').trim() !== ''))
      .map(r => {
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = (r[idx] || '').trim(); });
        return obj;
      });
  }

  function normalizeCode(prefix, number) {
    const p = String(prefix || '').trim().toUpperCase();
    const n = String(number || '').trim();
    return p && n ? `${p} ${n}` : '';
  }

  function extractCourseCodes(text) {
    const found = [];
    const seen = new Set();
    CODE_RE.lastIndex = 0;
    let match;
    while ((match = CODE_RE.exec(String(text || ''))) !== null) {
      const code = normalizeCode(match[1], match[2]);
      if (!seen.has(code)) {
        seen.add(code);
        found.push(code);
      }
    }
    return found;
  }

  function getPrereqCodes(row) {
    return extractCourseCodes(row['Prerequisites']);
  }

  function getCoreqCodes(row) {
    return extractCourseCodes(row['Corequisites']);
  }

  function getPreCoreqCodes(row) {
    return extractCourseCodes(row['Pre- or Corequisites']);
  }

  function cleanSemester(value) {
    return String(value || '').replace(/;\s*/g, '; ').replace(/\s+/g, ' ').trim();
  }

  function buildCourse(row) {
    const code = normalizeCode(row['Course Prefix'], row['Course Number']) || String(row['Class Number'] || '').trim().toUpperCase();
    return {
      raw: row,
      code,
      prefix: row['Course Prefix'] || '',
      number: row['Course Number'] || '',
      title: row['Course Title'] || '',
      credits: row['Credit Hours'] || '',
      school: row['School'] || '',
      field: row['Field of Study'] || '',
      prereqs: [],
      coreqs: [],
      preCoreqs: [],
      semester: cleanSemester(row['Semester Offered']),
      other: row['Other Requirements / Notes'] || '',
      description: row['Full Course Description'] || ''
    };
  }

  function loadRows(rows) {
    courses = rows.map(buildCourse).filter(c => c.code);
    courseByCode = new Map();
    courses.forEach(c => courseByCode.set(c.code, c));
    courses.forEach(c => {
      c.prereqs = getPrereqCodes(c.raw);
      c.coreqs = getCoreqCodes(c.raw);
      c.preCoreqs = getPreCoreqCodes(c.raw);
    });
    courses.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
    els.search.disabled = false;
    els.status.className = 'status';
    els.status.textContent = `Loaded ${courses.length.toLocaleString()} courses from CSV.`;
    renderResults('');
    els.detail.innerHTML = '<div class="empty">Select a course to see its prerequisite tree.</div>';
  }

  async function loadCsvFromUrl() {
    try {
      const response = await fetch(CSV_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      loadRows(parseCsv(text));
    } catch (err) {
      els.status.className = 'status error';
      els.status.textContent = `Could not automatically load ${CSV_URL}. Run this page from a local web server with the CSV in the same folder.`;
    }
  }

  function matchesQuery(course, query) {
    if (!query) return true;
    const q = query.toLowerCase().replace(/\s+/g, ' ').trim();
    const compactQ = q.replace(/\s+/g, '');
    const hay = [course.code, course.title, course.prefix, course.number, course.field, course.school].join(' ').toLowerCase();
    const compactCode = course.code.toLowerCase().replace(/\s+/g, '');
    return hay.includes(q) || compactCode.includes(compactQ);
  }

  function renderResults(query) {
    const list = courses.filter(c => matchesQuery(c, query)).slice(0, 250);
    if (list.length === 0) {
      els.results.innerHTML = '<div class="empty">No matching courses.</div>';
      return;
    }
    els.results.innerHTML = list.map(c => `
      <div class="result ${c.code === activeCode ? 'active' : ''}" data-code="${escapeHtml(c.code)}">
        <div class="code">${escapeHtml(c.code)}</div>
        <div class="title">${escapeHtml(c.title)}</div>
        <div class="meta">${escapeHtml(c.school)}${c.credits ? ' • ' + escapeHtml(c.credits) : ''}</div>
      </div>
    `).join('');
  }

  function tooltipHtml(course, code) {
    if (!course) {
      return `<div class="tt-title">${escapeHtml(code)}</div><div class="tt-line">This course appears as a prerequisite, but it was not found as its own course in the CSV.</div>`;
    }
    return `
      <div class="tt-title">${escapeHtml(course.code)} — ${escapeHtml(course.title)}</div>
      <div class="tt-line"><span class="tt-label">Semester:</span> ${escapeHtml(course.semester || 'Not listed')}</div>
      <div class="tt-line"><span class="tt-label">Other requirements:</span> ${escapeHtml(course.other || 'None listed')}</div>
      <div class="tt-line"><span class="tt-label">Description:</span> ${escapeHtml(course.description || 'No description listed')}</div>
    `;
  }

  function attachTooltip(el, course, code) {
    el.addEventListener('mouseenter', () => {
      els.tooltip.innerHTML = tooltipHtml(course, code);
      els.tooltip.style.display = 'block';
    });
    el.addEventListener('mousemove', (evt) => {
      const pad = 16;
      const rect = els.tooltip.getBoundingClientRect();
      let x = evt.clientX + pad;
      let y = evt.clientY + pad;
      if (x + rect.width > window.innerWidth - 8) x = evt.clientX - rect.width - pad;
      if (y + rect.height > window.innerHeight - 8) y = evt.clientY - rect.height - pad;
      els.tooltip.style.left = `${Math.max(8, x)}px`;
      els.tooltip.style.top = `${Math.max(8, y)}px`;
    });
    el.addEventListener('mouseleave', () => { els.tooltip.style.display = 'none'; });
  }

  function courseNodeLabel(course, code, repeated) {
    const title = course && course.title ? ` — ${course.title}` : '';
    const cycle = repeated ? ' (cycle)' : '';
    return `<strong>${code}</strong>${title}${cycle}`;
  }

  function relationClass(relation) {
    if (relation === 'Corequisite') return 'coreq';
    if (relation === 'Pre- or corequisite') return 'precoreq';
    if (relation === 'Selected course') return 'selected';
    return 'prereq';
  }

  function getEdges(course) {
    if (!course) return [];
    const edges = [];
    course.prereqs.forEach(code => edges.push({ code, relation: 'Prerequisite' }));
    course.coreqs.forEach(code => edges.push({ code, relation: 'Corequisite' }));
    course.preCoreqs.forEach(code => edges.push({ code, relation: 'Pre- or corequisite' }));
    const seen = new Set();
    return edges.filter(edge => {
      const key = `${edge.relation}|${edge.code}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function hasPrereqs(course) {
    return !!(course && course.prereqs && course.prereqs.length);
  }


  function getRequirementEdges(course) {
    if (!course) return [];
    const edges = [];
    course.prereqs.forEach(code => edges.push({ code, relation: 'Prerequisite' }));
    course.coreqs.forEach(code => edges.push({ code, relation: 'Corequisite' }));
    course.preCoreqs.forEach(code => edges.push({ code, relation: 'Pre- or corequisite' }));
    const seen = new Set();
    return edges.filter(edge => {
      const key = `${edge.relation}|${edge.code}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function buildRequirementGraph(rootCode) {
    const nodes = new Map();
    const edges = [];
    const edgeKeys = new Set();

    function ensureNode(code) {
      if (!nodes.has(code)) {
        const course = courseByCode.get(code);
        nodes.set(code, { code, course, level: 0, outgoingRelations: new Set(), incomingCount: 0 });
      }
      return nodes.get(code);
    }

    function addEdge(from, to, relation) {
      // Edge direction is prerequisite -> course that requires it.
      const key = `${from}|${to}|${relation}`;
      if (edgeKeys.has(key)) return;
      edgeKeys.add(key);
      edges.push({ from, to, relation });
      ensureNode(from).outgoingRelations.add(relation);
      ensureNode(to).incomingCount += 1;
    }

    function visit(code, depth, path) {
      const node = ensureNode(code);
      node.level = Math.max(node.level || 0, depth);
      const course = courseByCode.get(code);
      if (!course) return;
      const nextPath = new Set(path);
      nextPath.add(code);
      getRequirementEdges(course).forEach(edge => {
        // Avoid cycle duplication. A cycle is not a prerequisite branch, so do not draw it.
        if (nextPath.has(edge.code)) return;
        const reqNode = ensureNode(edge.code);
        reqNode.level = Math.max(reqNode.level || 0, depth + 1);
        addEdge(edge.code, code, edge.relation);
        visit(edge.code, depth + 1, nextPath);
      });
    }

    visit(rootCode, 0, new Set());

    const maxLevel = Math.max(0, ...Array.from(nodes.values()).map(node => node.level || 0));
    const rows = Array.from({ length: maxLevel + 1 }, () => []);
    nodes.forEach(node => {
      if (!rows[node.level]) rows[node.level] = [];
      rows[node.level].push(node);
    });

    // Initial deterministic order, then barycentric passes to keep shared prerequisites near
    // the courses that depend on them. This reduces crossing lines while preserving levels.
    rows.forEach(row => row.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true })));
    function positionMaps() {
      return rows.map(row => {
        const pos = new Map();
        row.forEach((node, idx) => pos.set(node.code, idx));
        return pos;
      });
    }
    for (let pass = 0; pass < 6; pass += 1) {
      const positions = positionMaps();
      for (let level = 1; level < rows.length; level += 1) {
        rows[level].sort((a, b) => {
          const aDeps = edges.filter(edge => edge.from === a.code).map(edge => positions[edge.to === rootCode ? 0 : (nodes.get(edge.to)?.level || 0)].get(edge.to)).filter(v => v != null);
          const bDeps = edges.filter(edge => edge.from === b.code).map(edge => positions[edge.to === rootCode ? 0 : (nodes.get(edge.to)?.level || 0)].get(edge.to)).filter(v => v != null);
          const aScore = aDeps.length ? aDeps.reduce((sum, v) => sum + v, 0) / aDeps.length : Number.MAX_SAFE_INTEGER;
          const bScore = bDeps.length ? bDeps.reduce((sum, v) => sum + v, 0) / bDeps.length : Number.MAX_SAFE_INTEGER;
          if (aScore !== bScore) return aScore - bScore;
          return a.code.localeCompare(b.code, undefined, { numeric: true });
        });
      }
    }

    return { rootCode, nodes, edges, rows };
  }

  function graphNodeLabelHtml(course, code) {
    const title = course && course.title ? ` — ${escapeHtml(course.title)}` : '';
    return `<strong>${escapeHtml(code)}</strong>${title}`;
  }

  function relationBadgesHtml(node, rootCode) {
    if (node.code === rootCode) {
      return '<span class="edge-label selected">Selected</span>';
    }
    const rels = Array.from(node.outgoingRelations);
    if (!rels.length) return '';
    return rels.map(rel => `<span class="edge-label ${relationClass(rel)}">${escapeHtml(rel)}</span>`).join('');
  }

  function renderRequirementGraph(rootCode) {
    const graph = buildRequirementGraph(rootCode);
    currentGraph = graph;
    const tree = document.getElementById('tree');
    if (!tree) return;
    if (!graph.nodes.size) {
      tree.innerHTML = '<div class="graph-empty">No prerequisite information found.</div>';
      return;
    }

    tree.innerHTML = `
      <div id="reqGraph" class="req-graph">
        <div id="reqGraphContent" class="req-graph-content">
          <svg id="reqGraphSvg" class="req-graph-svg" aria-hidden="true"></svg>
          <div id="graphLevels" class="graph-levels"></div>
        </div>
      </div>
    `;
    const levels = document.getElementById('graphLevels');
    graph.rows.forEach((row, level) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'graph-level';
      rowEl.dataset.level = String(level);
      row.forEach(nodeData => {
        const nodeEl = document.createElement('span');
        const isLeaf = !graph.edges.some(edge => edge.to === nodeData.code);
        nodeEl.className = `graph-node ${nodeData.course ? '' : 'missing'} ${nodeData.code === rootCode ? 'selected' : ''} ${isLeaf ? 'leaf' : ''}`;
        nodeEl.dataset.code = nodeData.code;
        const nodeTitle = nodeData.course && nodeData.course.title ? escapeHtml(nodeData.course.title) : '';
        nodeEl.innerHTML = `
          ${isLeaf ? '<span class="leaf-dot">●</span>' : ''}
          <span class="graph-node-content">
            <span class="graph-node-top">
              <strong class="graph-node-code">${escapeHtml(nodeData.code)}</strong>
              ${relationBadgesHtml(nodeData, rootCode)}
            </span>
            ${nodeTitle ? `<span class="graph-node-title">${nodeTitle}</span>` : ''}
          </span>
        `;
        attachTooltip(nodeEl, nodeData.course, nodeData.code);
        rowEl.appendChild(nodeEl);
      });
      levels.appendChild(rowEl);
    });

    requestAnimationFrame(() => {
      applyGraphScaleToFit();
      drawRequirementGraphEdges();
    });
  }

  function applyGraphScaleToFit() {
    const graphEl = document.getElementById('reqGraph');
    const content = document.getElementById('reqGraphContent');
    const levels = document.getElementById('graphLevels');
    const svg = document.getElementById('reqGraphSvg');
    if (!graphEl || !content || !levels || !svg) return;

    content.style.transform = 'none';
    content.style.left = '0px';

    const availableWidth = Math.max(240, graphEl.clientWidth - 36);

    // Force the graph to lay itself out inside the pane first. Rows are allowed
    // to wrap, which effectively moves extra nodes downward rather than letting
    // the graph spill horizontally.
    content.style.width = `${availableWidth}px`;
    levels.style.width = `${availableWidth}px`;

    // Very crowded levels get tighter nodes and gaps before we measure height.
    const widestLevel = Math.max(1, ...Array.from(levels.children).map(level => level.children.length));
    const crowded = widestLevel >= 4;
    const veryCrowded = widestLevel >= 6;
    levels.classList.toggle('crowded', crowded);
    levels.classList.toggle('very-crowded', veryCrowded);

    const naturalWidth = availableWidth;
    const naturalHeight = Math.max(260, levels.scrollHeight);
    const scale = 1;

    content.style.height = `${naturalHeight}px`;
    content.style.transform = `scale(${scale})`;
    content.dataset.scale = String(scale);
    graphEl.style.minHeight = `${Math.ceil(naturalHeight + 36)}px`;
    svg.setAttribute('viewBox', `0 0 ${naturalWidth} ${naturalHeight}`);
    svg.setAttribute('width', naturalWidth);
    svg.setAttribute('height', naturalHeight);
  }

  function drawRequirementGraphEdges() {
    const graphEl = document.getElementById('reqGraph');
    const content = document.getElementById('reqGraphContent');
    const levels = document.getElementById('graphLevels');
    const svg = document.getElementById('reqGraphSvg');
    if (!graphEl || !content || !levels || !svg || !currentGraph) return;

    const scale = Number(content.dataset.scale || '1') || 1;
    const contentRect = content.getBoundingClientRect();
    const width = Math.max(levels.scrollWidth, Number(svg.getAttribute('width')) || 0, graphEl.clientWidth - 36);
    const height = Math.max(levels.scrollHeight, Number(svg.getAttribute('height')) || 0, 260);
    svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
    svg.setAttribute('width', width);
    svg.setAttribute('height', height);
    svg.innerHTML = `
      <defs>
        <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b9bb0"></path>
        </marker>
      </defs>
    `;

    const nodeMap = new Map();
    content.querySelectorAll('.graph-node').forEach(node => {
      const rect = node.getBoundingClientRect();
      nodeMap.set(node.dataset.code, {
        x: (rect.left - contentRect.left) / scale,
        y: (rect.top - contentRect.top) / scale,
        w: rect.width / scale,
        h: rect.height / scale
      });
    });

    currentGraph.edges.forEach(edge => {
      const from = nodeMap.get(edge.from);
      const to = nodeMap.get(edge.to);
      if (!from || !to) return;
      // Nodes are arranged root-to-leaves from top to bottom, but edge direction is
      // prerequisite -> dependent. So the visible arrow travels upward.
      const x1 = from.x + from.w / 2;
      const y1 = from.y;
      const x2 = to.x + to.w / 2;
      const y2 = to.y + to.h;
      const gap = Math.max(18, (y1 - y2) / 2);
      const midY = y1 - gap;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
      path.setAttribute('class', `edge-path ${relationClass(edge.relation)}`);
      svg.appendChild(path);
    });
  }

  function expandAllTree() {
    // Graph view is fully visible by design.
    drawRequirementGraphEdges();
  }

  function collapseTreeToFirstLayer() {
    // Graph view is fully visible by design.
    drawRequirementGraphEdges();
  }

  function getCoursesThatUseAsPrereq(code) {
    return courses
      .filter(c => c.code !== code && (c.prereqs.includes(code) || c.preCoreqs.includes(code)))
      .sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
  }

  function renderReversePrereqSection(course) {
    const dependents = getCoursesThatUseAsPrereq(course.code);
    if (dependents.length === 0) {
      return `
        <div class="reverse-wrap">
          <div class="reverse-title">Courses that use this as a prerequisite</div>
          <div class="empty">No courses in this CSV list ${escapeHtml(course.code)} as a prerequisite.</div>
        </div>
      `;
    }
    const links = dependents.map(c => `
      <button type="button" class="reverse-link" data-code="${escapeHtml(c.code)}" title="${escapeHtml(c.title)}">
        ${escapeHtml(c.code)} — ${escapeHtml(c.title)}
      </button>
    `).join('');
    return `
      <div class="reverse-wrap">
        <div class="reverse-title">Courses that use this as a prerequisite</div>
        <div class="hint">Includes courses where this appears in Prerequisites or Pre-/Corequisites.</div>
        <div class="reverse-list">${links}</div>
      </div>
    `;
  }


  function getExportFileName() {
    const safeCode = String(activeCode || 'course_tree')
      .trim()
      .replace(/[^A-Za-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');
    return `${safeCode || 'course_tree'}_prereqs.jpg`;
  }

  function getCssVar(name, fallback) {
    const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return value || fallback;
  }

  function wrapCanvasText(ctx, text, maxWidth) {
    const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ').filter(Boolean);
    const lines = [];
    let line = '';
    words.forEach(word => {
      const test = line ? `${line} ${word}` : word;
      if (ctx.measureText(test).width <= maxWidth || !line) {
        line = test;
      } else {
        lines.push(line);
        line = word;
      }
    });
    if (line) lines.push(line);
    return lines.length ? lines : [''];
  }

  function roundRectPath(ctx, x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
  }

  function fillRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
    roundRectPath(ctx, x, y, w, h, r);
    ctx.fillStyle = fill;
    ctx.fill();
    if (stroke) {
      ctx.strokeStyle = stroke;
      ctx.stroke();
    }
  }

  function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
    const lines = wrapCanvasText(ctx, text, maxWidth);
    lines.forEach((line, idx) => ctx.fillText(line, x, y + idx * lineHeight));
    return lines.length * lineHeight;
  }


  function getVisibleTreeRows() {
    if (!currentGraph) return [];
    const rows = [];
    currentGraph.rows.forEach((row, level) => {
      row.forEach(node => {
        const course = node.course;
        const isLeaf = !currentGraph.edges.some(edge => edge.to === node.code);
        rows.push({
          level,
          code: node.code,
          title: course ? course.title : '',
          label: `${node.code}${course && course.title ? ' — ' + course.title : ''}`,
          relations: node.code === currentGraph.rootCode ? ['Selected course'] : Array.from(node.outgoingRelations),
          isLeaf,
          isRoot: node.code === currentGraph.rootCode
        });
      });
    });
    return rows;
  }

  function getReverseRows() {
    const course = courseByCode.get(activeCode);
    return course ? getCoursesThatUseAsPrereq(course.code) : [];
  }

  async function exportRightPaneAsJpg() {
    const status = document.getElementById('exportStatus');
    if (status) {
      status.className = 'export-status';
      status.textContent = 'Preparing JPG…';
    }

    try {
      els.tooltip.style.display = 'none';
      const course = courseByCode.get(activeCode);
      if (!course) throw new Error('Select a course before exporting.');

      const rightPane = document.querySelector('.panel.right');
      const width = Math.max(1000, Math.ceil((rightPane && rightPane.clientWidth) || 1000));
      const margin = 34;
      const contentWidth = width - margin * 2;
      const line = getCssVar('--line', '#d7d2c8');
      const ink = getCssVar('--ink', '#1f2937');
      const muted = getCssVar('--muted', '#6b7280');
      const accent = getCssVar('--accent', '#2b6cb0');

      const measureCanvas = document.createElement('canvas');
      const mctx = measureCanvas.getContext('2d');
      let estimatedHeight = 260;
      mctx.font = '16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      estimatedHeight += wrapCanvasText(mctx, course.description || 'No description listed.', contentWidth).length * 24;
      estimatedHeight += Math.max(1, getVisibleTreeRows().length) * 44;
      estimatedHeight += Math.max(1, getReverseRows().length) * 30;
      estimatedHeight += 260;

      const scale = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
      const canvas = document.createElement('canvas');
      canvas.width = Math.ceil(width * scale);
      canvas.height = Math.ceil(estimatedHeight * scale);
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, estimatedHeight);

      let y = margin;
      ctx.fillStyle = ink;
      ctx.font = '700 30px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillText(course.code, margin, y + 30);
      ctx.font = '20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      drawWrappedText(ctx, course.title, margin + 150, y + 30, contentWidth - 150, 26);
      y += 62;

      ctx.strokeStyle = line;
      ctx.beginPath();
      ctx.moveTo(margin, y);
      ctx.lineTo(width - margin, y);
      ctx.stroke();
      y += 24;

      const chips = [course.school, course.field, course.credits, course.semester].filter(Boolean);
      ctx.font = '13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      let chipX = margin;
      chips.forEach(chip => {
        const chipText = String(chip);
        const chipW = Math.min(contentWidth, ctx.measureText(chipText).width + 22);
        if (chipX + chipW > width - margin) {
          chipX = margin;
          y += 34;
        }
        fillRoundedRect(ctx, chipX, y, chipW, 25, 13, '#eef2f7', null);
        ctx.fillStyle = '#374151';
        ctx.fillText(chipText, chipX + 11, y + 17);
        chipX += chipW + 8;
      });
      y += 48;

      ctx.fillStyle = '#374151';
      ctx.font = '16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      y += drawWrappedText(ctx, course.description || 'No description listed.', margin, y, contentWidth, 24) + 26;

      ctx.fillStyle = ink;
      ctx.font = '800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillText('Prerequisite/corequisite graph', margin, y);
      y += 22;

      if (currentGraph) {
        const graphRows = currentGraph.rows;
        const nodeLayout = new Map();
        const rowGap = 82;
        const nodeW = 245;
        const nodeH = 54;
        const graphTop = y + 12;
        const graphHeight = Math.max(1, graphRows.length) * nodeH + Math.max(0, graphRows.length - 1) * rowGap + 32;
        const graphLeft = margin;
        fillRoundedRect(ctx, graphLeft, y, contentWidth, graphHeight + 24, 16, '#fbfaf7', line);
        y = graphTop;

        graphRows.forEach((row, level) => {
          const totalW = row.length * nodeW + Math.max(0, row.length - 1) * 24;
          let x = margin + Math.max(18, (contentWidth - totalW) / 2);
          row.forEach(node => {
            nodeLayout.set(node.code, { x, y, w: nodeW, h: nodeH });
            x += nodeW + 24;
          });
          y += nodeH + rowGap;
        });

        currentGraph.edges.forEach(edge => {
          const from = nodeLayout.get(edge.from);
          const to = nodeLayout.get(edge.to);
          if (!from || !to) return;
          const x1 = from.x + from.w / 2;
          const y1 = from.y + from.h;
          const x2 = to.x + to.w / 2;
          const y2 = to.y;
          const midY = y1 + Math.max(24, (y2 - y1) / 2);
          ctx.strokeStyle = edge.relation === 'Corequisite' ? '#86efac' : edge.relation === 'Pre- or corequisite' ? '#fdba74' : '#9ec1df';
          ctx.lineWidth = 2;
          if (edge.relation !== 'Prerequisite') ctx.setLineDash([6, 5]);
          else ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.bezierCurveTo(x1, midY, x2, midY, x2, y2);
          ctx.stroke();
          ctx.setLineDash([]);
        });

        graphRows.forEach(row => {
          row.forEach(node => {
            const layout = nodeLayout.get(node.code);
            if (!layout) return;
            const isRoot = node.code === currentGraph.rootCode;
            const isLeaf = !currentGraph.edges.some(edge => edge.to === node.code);
            fillRoundedRect(ctx, layout.x, layout.y, layout.w, layout.h, 14, isRoot ? '#f5f3ff' : isLeaf ? '#f8fafc' : '#ffffff', isRoot ? '#c4b5fd' : line);
            let tx = layout.x + 12;
            if (isLeaf) {
              ctx.fillStyle = '#9ca3af';
              ctx.font = '900 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
              ctx.fillText('●', tx, layout.y + 28);
              tx += 20;
            }
            const rels = isRoot ? ['Selected'] : Array.from(node.outgoingRelations).slice(0, 2);
            ctx.font = '800 9px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
            rels.forEach(rel => {
              const relText = rel === 'Pre- or corequisite' ? 'PRE/COREQ' : rel.toUpperCase();
              const relW = ctx.measureText(relText).width + 12;
              const bg = rel === 'Selected' ? '#ede9fe' : rel === 'Corequisite' ? '#ecfdf5' : rel === 'Pre- or corequisite' ? '#fff7ed' : '#e7f0fa';
              const fg = rel === 'Selected' ? '#5b21b6' : rel === 'Corequisite' ? '#065f46' : rel === 'Pre- or corequisite' ? '#9a3412' : '#1e3a8a';
              fillRoundedRect(ctx, tx, layout.y + 8, relW, 17, 9, bg, null);
              ctx.fillStyle = fg;
              ctx.fillText(relText, tx + 6, layout.y + 20);
              tx += relW + 6;
            });
            ctx.fillStyle = ink;
            ctx.font = '800 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
            ctx.fillText(node.code, layout.x + 12, layout.y + 42);
            const title = node.course && node.course.title ? node.course.title : '';
            if (title) {
              ctx.font = '13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
              const titleText = title.length > 24 ? title.slice(0, 23) + '…' : title;
              ctx.fillText(titleText, layout.x + 82, layout.y + 42);
            }
          });
        });
        y = graphTop + graphHeight + 24;
      }

      y += 16;
      ctx.strokeStyle = line;
      ctx.beginPath();
      ctx.moveTo(margin, y);
      ctx.lineTo(width - margin, y);
      ctx.stroke();
      y += 30;

      ctx.fillStyle = ink;
      ctx.font = '800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillText('Courses that use this as a prerequisite', margin, y);
      y += 30;
      const reverseRows = getReverseRows();
      ctx.font = '14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      ctx.fillStyle = reverseRows.length ? accent : muted;
      if (reverseRows.length === 0) {
        ctx.fillText(`No courses in this CSV list ${course.code} as a prerequisite.`, margin, y);
        y += 24;
      } else {
        reverseRows.forEach(dep => {
          y += drawWrappedText(ctx, `${dep.code} — ${dep.title}`, margin, y, contentWidth, 22);
        });
      }

      const finalHeight = Math.ceil((y + margin) * scale);
      if (finalHeight < canvas.height) {
        const trimmed = document.createElement('canvas');
        trimmed.width = canvas.width;
        trimmed.height = finalHeight;
        const tctx = trimmed.getContext('2d');
        tctx.fillStyle = '#ffffff';
        tctx.fillRect(0, 0, trimmed.width, trimmed.height);
        tctx.drawImage(canvas, 0, 0);
        await downloadCanvasAsJpg(trimmed, getExportFileName());
      } else {
        await downloadCanvasAsJpg(canvas, getExportFileName());
      }

      if (status) status.textContent = `Downloaded ${getExportFileName()}`;
    } catch (err) {
      if (status) {
        status.className = 'export-status error';
        status.textContent = err.message || 'Export failed.';
      }
    }
  }

  function downloadCanvasAsJpg(canvas, filename) {
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (!blob) {
          reject(new Error('The browser could not create the JPG.'));
          return;
        }
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        resolve();
      }, 'image/jpeg', 0.95);
    });
  }

  function renderDetail(code) {
    const course = courseByCode.get(code);
    if (!course) return;
    activeCode = code;
    renderResults(els.search.value);

    els.detail.innerHTML = `
      <div class="course-head">
        <h2>${escapeHtml(course.code)}</h2>
        <div>${escapeHtml(course.title)}</div>
      </div>
      <div style="margin-top:12px">
        ${course.school ? `<span class="chip">${escapeHtml(course.school)}</span>` : ''}
        ${course.field ? `<span class="chip">${escapeHtml(course.field)}</span>` : ''}
        ${course.credits ? `<span class="chip">${escapeHtml(course.credits)}</span>` : ''}
        ${course.semester ? `<span class="chip">${escapeHtml(course.semester)}</span>` : ''}
      </div>
      <div class="desc">${escapeHtml(course.description || 'No description listed.')}</div>
      <div class="tree-wrap">
        <div class="tree-title">Prerequisite/corequisite graph</div>
        <div class="tree-toolbar">
          <button type="button" id="expandAllTree">Expand all</button>
          <button type="button" id="collapseAllTree">Collapse all</button>
          <button type="button" id="exportRightPaneJpg">Export JPG</button>
          <span id="exportStatus" class="export-status" aria-live="polite"></span>
        </div>
        <div id="tree" class="tree"></div>
      </div>
      ${renderReversePrereqSection(course)}
    `;
    renderRequirementGraph(course.code);
    const tree = document.getElementById('tree');
    document.getElementById('expandAllTree').addEventListener('click', () => expandAllTree(tree));
    document.getElementById('collapseAllTree').addEventListener('click', () => collapseTreeToFirstLayer(tree));
    document.getElementById('exportRightPaneJpg').addEventListener('click', exportRightPaneAsJpg);
    els.detail.querySelectorAll('.reverse-link').forEach(link => {
      link.addEventListener('click', () => {
        renderDetail(link.dataset.code);
        els.detail.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  els.search.addEventListener('input', () => renderResults(els.search.value));
  els.results.addEventListener('click', evt => {
    const item = evt.target.closest('.result');
    if (item && item.dataset.code) renderDetail(item.dataset.code);
  });
  window.addEventListener('resize', () => { if (currentGraph) requestAnimationFrame(() => { applyGraphScaleToFit(); drawRequirementGraphEdges(); }); });
  loadCsvFromUrl();
}());
</script>
</body>
